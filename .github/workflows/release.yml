name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lazarus
        uses: gcarreno/setup-lazarus@v3
        with:
          lazarus-version: stable
          with-cache: false

      - name: Build package
        run: lazbuild --add-package Source/DIMComponents.lpk

      - name: Build win64
        run: >
          lazbuild -B
          --cpu=x86_64
          --os=win64
          Source/DiskImageManager.lpi

      - name: Package win64
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path out -Recurse -Filter "DiskImageManager.exe" | Select-Object -First 1
          Compress-Archive -Path $exe.FullName -DestinationPath DiskImageManager-win64.zip

      - name: Upload win64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} DiskImageManager-win64.zip
